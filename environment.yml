name: binding-metrics
# Developer environment for BindingMetrics.
#
# OpenMM is installed from conda-forge with cuda-version=12 pinned to avoid
# CUDA PTX version mismatches on drivers that don't support CUDA 13.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate binding-metrics
#   binding-metrics-check-env           # verify GPU and all dependencies
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.11

  # Pin cuda-version=12 so the solver picks a CUDA 12 build of OpenMM, avoiding
  # CUDA_ERROR_UNSUPPORTED_PTX_VERSION on drivers that don't support CUDA 13.
  - openmm>=8.0
  - cuda-version=12*
  - openmmforcefields>=0.13
  - openff-toolkit>=0.14

  # pip-installable extras (defined in pyproject.toml)
  - pip
  - pip:
      - ".[all,dev]"
