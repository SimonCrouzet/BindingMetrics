name: binding-metrics
# Developer environment for BindingMetrics.
# For GPU-accelerated OpenMM (CUDA support), conda-forge is the most reliable
# source of pre-built binaries. All other dependencies are pip-installable.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate binding-metrics
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.11

  # GPU-ready OpenMM from conda-forge (handles CUDA/OpenCL binaries)
  - openmm>=8.0

  # GAFF2/SMIRNOFF parameters for non-standard residues and small molecules
  # (openmmforcefields bundles AmberTools atom-typers; conda-forge build is
  #  preferred because it links the correct AmberTools native libs)
  - openmmforcefields>=0.13
  - openff-toolkit>=0.14

  # pip-installable extras (defined in pyproject.toml)
  # For development, replace with: pip install -e ".[all,dev]"
  - pip
  - pip:
      - ".[all]"
