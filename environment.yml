name: binding-metrics
channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python>=3.11

  # Core dependencies
  - numpy>=1.24
  - openmm>=8.0
  - mdtraj>=1.9

  # Optional but recommended
  - pdbfixer>=1.9

  # Development
  - pytest>=7.0
  - ruff>=0.1

  # Install the package in editable mode
  - pip
  - pip:
      - -e ".[dev]"
