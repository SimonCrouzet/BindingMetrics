name: binding-metrics
# Developer environment for BindingMetrics.
#
# OpenMM is installed from conda-forge with cuda-version=12.4 pinned to match
# the Docker base image and avoid CUDA PTX version mismatches.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate binding-metrics
#   binding-metrics-check-env           # verify GPU and all dependencies
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.11

  # Pin cuda-version to match the Docker base image (cuda:12.4.0-runtime) so the
  # conda solver doesn't pick a newer PTX version than the container runtime supports.
  - openmm>=8.0
  - cuda-version=12.4
  - openmmforcefields>=0.13
  - openff-toolkit>=0.14

  # pip-installable extras (defined in pyproject.toml)
  - pip
  - pip:
      - ".[all,dev]"
